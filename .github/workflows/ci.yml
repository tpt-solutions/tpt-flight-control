name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-and-test:
    name: Build & Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --verbose
      - run: cargo test  --workspace --verbose

  feature-matrix:
    name: Build & Test (feature-gated)
    runs-on: ubuntu-latest
    # `cargo test --workspace` above only exercises each crate's *default*
    # features. Several crates gate real functionality (and its tests)
    # behind non-default flags — e.g. tpt-core's `autopilot`, `swarm`,
    # `formation`, `glide`, and `triple-redundancy` modules (default = [])
    # — so without this job those tests are never compiled or run by CI,
    # even though they exist and pass locally. `--all-features` is safe for
    # these crates specifically: their features are additive logic modules
    # with no conflicting/mutually-exclusive flags. `tpt-web --features web`
    # is included too — despite pulling in `leptos`/`wasm-bindgen`, it
    # compiles and links fine on a native host with no extra system
    # packages. `tpt-gcs --features gui` needs X11/GTK system packages
    # (pulls in `eframe`/`winit`), so it gets its own `gui` job below with
    # an `apt-get install` step instead of living here.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p tpt-core --all-features --verbose
      - run: cargo test -p tpt-mixer --all-features --verbose
      - run: cargo test -p tpt-sensor-fusion --all-features --verbose
      - run: cargo test -p tpt-mapping --all-features --verbose
      - run: cargo test -p tpt-protocols --all-features --verbose
      - run: cargo test -p tpt-sim --all-features --verbose
      - run: cargo test -p tpt-backend-bare-metal --all-features --verbose
      - run: cargo test -p tpt-sovereign-toolchain --all-features --verbose
      - run: cargo test -p tpt-web --features web --verbose

  gui:
    name: Build & Test (tpt-gcs gui)
    runs-on: ubuntu-latest
    # `tpt-gcs --features gui` pulls in `eframe`/`egui`, which need X11/GTK
    # dev headers to link on Linux. Package list matches egui's own CI
    # (github.com/emilk/egui .github/workflows/rust.yml) for the same
    # eframe major version.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GUI system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev
      - run: cargo test -p tpt-gcs --features gui --verbose

  no-std:
    name: Build no_std core crates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [thumbv7em-none-eabihf, riscv32imac-unknown-none-elf]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Core crates must compile for embedded `no_std` targets.
      - run: |
          cargo build --target ${{ matrix.target }} -p tpt-math
          cargo build --target ${{ matrix.target }} -p tpt-abstractions
          cargo build --target ${{ matrix.target }} -p tpt-core
          cargo build --target ${{ matrix.target }} -p tpt-core --features triple-redundancy
          cargo build --target ${{ matrix.target }} -p tpt-sensor-fusion
          cargo build --target ${{ matrix.target }} -p tpt-mixer
          cargo build --target ${{ matrix.target }} -p tpt-backend-bare-metal

  kani:
    name: Formal verification (Kani)
    runs-on: ubuntu-latest
    # New job: proof harnesses were authored against the Kani APIs but have
    # never been executed by the real `kani-compiler` (Kani only supports
    # Linux/macOS hosts, so this job is the first real run). Non-blocking
    # until a maintainer has seen it go green at least once; then remove
    # `continue-on-error` so it gates merges like the other jobs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Kani proofs (tpt-math)
        uses: model-checking/kani-github-action@v1
        with:
          args: "-p tpt-math"
      - name: Run Kani proofs (tpt-mapping)
        uses: model-checking/kani-github-action@v1
        with:
          args: "-p tpt-mapping"

  audit:
    name: Dependency audit & supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Audit dependencies
        run: cargo deny --all-features check advisories licenses bans sources

  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --all --format xml --output sbom/bom.xml
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/bom.xml
